name: CI

on:
  push:
    branches:
      - main
      - beta
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      # Persist the Nx cache across runs so the e2e job's web+api build can
      # reuse this job's cached build on a later run, avoiding a redundant rebuild.
      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nx-

      # i18n-sync is the key-drift gate (issue #50): it type-checks the tool then
      # diffs every locale catalog against en.json. run-many invokes it for the
      # one project that defines it (web), failing the build on drift.
      - run: pnpm exec nx run-many -t lint test build i18n-sync

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      # Persist the Nx cache across runs so this job's web+api build (triggered by
      # the e2e dependsOn) can reuse the main job's cached build on a later run,
      # avoiding a redundant rebuild.
      - uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nx-

      # Only chromium — the suite is a single-engine seam regression net (ADR-0009).
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm exec playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      # Cache the pinned TrailBase binary (downloaded by scripts/trailbase.mjs on
      # first boot) so the e2e server doesn't re-fetch ~22 MB every run. Keyed on
      # the script so a version bump invalidates it.
      - uses: actions/cache@v4
        with:
          path: .trailbase
          key: trailbase-${{ runner.os }}-${{ hashFiles('scripts/trailbase.mjs') }}

      - run: pnpm exec nx e2e web-e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web-e2e/playwright-report/
          retention-days: 7

  release-preview:
    if: >-
      github.event_name == 'pull_request' &&
      (github.base_ref == 'main' || github.base_ref == 'beta')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      - name: Release dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell semantic-release we're on the target branch so it analyses
          # the commits and reports the version that would be released.
          GITHUB_REF: refs/heads/${{ github.base_ref }}
        run: pnpm exec semantic-release --dry-run

  release:
    needs: [main, e2e]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      - name: Semantic release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(git tag --sort=-version:refname | head -1)
          pnpm exec semantic-release
          NEXT=$(git tag --sort=-version:refname | head -1)
          if [ "$PREV" != "$NEXT" ] && [ -n "$NEXT" ]; then
            echo "tag=$NEXT" >> $GITHUB_OUTPUT
          fi

      - name: Log in to ghcr.io
        if: steps.release.outputs.tag
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.release.outputs.tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/williamchelman/hexly
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/beta' }}

      - name: Set up Docker Buildx
        if: steps.release.outputs.tag
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.release.outputs.tag
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
